<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo • Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }

        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://i.ibb.co/YBNkz2Zh/black-white-icon-hooded-man-260nw-2631452863.webp') center/cover no-repeat;
        }

        .product-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-card:hover {
            transform: translateY(-15px) scale(1.03);
            box-shadow: 0 30px 60px -15px rgb(167, 139, 250);
        }

        .product-img {
            transition: transform 0.4s ease;
            cursor: pointer;
        }
        .product-img:hover {
            transform: scale(1.08);
        }
    </style>
</head>
<body class="bg-zinc-950 text-gray-200">

    <!-- HEADER -->
    <header class="bg-zinc-900/90 backdrop-blur-lg border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-14 h-14 bg-gradient-to-br from-violet-500 to-fuchsia-600 rounded-2xl flex items-center justify-center text-4xl shadow-xl">🌿</div>
                <div>
                    <h1 class="logo-font text-4xl font-bold tracking-tighter text-white">exemplo</h1>
                    <p class="text-xs text-violet-400 -mt-1">PREMIUM • EXCLUSIVO</p>
                </div>
            </div>
            
            <nav class="hidden md:flex items-center gap-10 text-lg font-medium">
                <a href="#home" class="hover:text-violet-400 transition">Início</a>
                <a href="#produtos" class="hover:text-violet-400 transition">Produtos</a>
                <a href="#sobre" class="hover:text-violet-400 transition">Sobre</a>
                <a href="#pedidos" class="hover:text-violet-400 transition">Fazer Pedido</a>
            </nav>

            <button onclick="toggleCart()" class="relative p-3 hover:bg-zinc-800 rounded-2xl transition">
                <i class="fa-solid fa-shopping-cart text-2xl text-violet-400"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-violet-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </header>

    <!-- HERO, PRODUTOS, FORMULÁRIO e FOOTER (mantidos iguais) -->
    <!-- ... (todo o HTML anterior continua igual) ... -->

    <!-- CARRINHO MODAL (mantido) -->
    <div id="cart-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 rounded-3xl max-w-lg w-full mx-4 max-h-[90vh] overflow-auto border border-zinc-700">
            <div class="p-8">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-3xl font-bold">Seu Carrinho</h3>
                    <button onclick="toggleCart()" class="text-4xl text-zinc-400 hover:text-white">×</button>
                </div>
                <div id="modal-cart-items" class="space-y-6"></div>
                
                <div class="mt-10 flex justify-between text-3xl font-bold">
                    <span>Total</span>
                    <span id="modal-total" class="text-violet-400">R$ 0,00</span>
                </div>
            </div>
            <div class="p-8 border-t border-zinc-700">
                <button onclick="irParaPedido()" class="w-full bg-violet-600 hover:bg-violet-700 py-6 rounded-3xl text-xl font-semibold transition">
                    Ir para Finalizar Pedido
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== FIREBASE CONFIG ====================
        const firebaseConfig = {
            apiKey: "AIzaSyCy1vh73wVCVG94jHDNMkYQYyiXXfHzHo0",
            authDomain: "data-base-dos-sites.firebaseapp.com",
            projectId: "data-base-dos-sites",
            storageBucket: "data-base-dos-sites.firebasestorage.app",
            messagingSenderId: "328520422607",
            appId: "1:328520422607:web:e5d88712edafe5a71dd3ba"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let products = [
            { id: 1, name: "Goma Premium", category: "flor", price: 25.00, img: "https://i.ibb.co/rRBrP80w/pngtree-square-gum-or-candy-background-sweet-yellow-sugar-photo-image-9056022.jpg" },
            { id: 2, name: "Pacote Especial", category: "flor", price: 45.00, img: "https://picsum.photos/id/201/600/400" },
            { id: 3, name: "Combo 3 Unidades", category: "flor", price: 65.00, img: "https://picsum.photos/id/237/600/400" },
            { id: 8, name: "Produto Exclusivo", category: "pudim", price: 35.00, img: "https://i.ibb.co/Xkrvrq1V/a6aee56d93ce0b9ea9edea8140563adb.jpg" }
        ];

        let cart = [];

        // Funções de produtos e carrinho (mantidas)
        function renderProducts() {
            const floresList = document.getElementById('flores-list');
            const pudinsList = document.getElementById('pudins-list');
            floresList.innerHTML = '';
            pudinsList.innerHTML = '';

            products.forEach(product => {
                const div = document.createElement('div');
                div.className = `product-card bg-zinc-800 rounded-3xl p-6 shadow-xl border border-zinc-700`;
                div.innerHTML = `
                    <div class="relative">
                        <img src="${product.img}" 
                             class="product-img w-full h-56 object-cover mx-auto mb-6 rounded-2xl" 
                             alt="${product.name}"
                             onclick="addToCart(${product.id})">
                    </div>
                    <h4 class="font-semibold text-2xl mb-3 text-center">${product.name}</h4>
                    <p class="text-violet-400 text-3xl font-bold text-center mb-6">R$ ${product.price.toFixed(2)}</p>
                    <button onclick="addToCart(${product.id}); event.stopImmediatePropagation()" 
                            class="w-full bg-gradient-to-r from-violet-500 to-fuchsia-500 text-white py-5 rounded-2xl font-semibold text-lg hover:brightness-110 transition">
                        Adicionar ao Carrinho
                    </button>
                `;
                if (product.category === 'flor') floresList.appendChild(div);
                else pudinsList.appendChild(div);
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            cart.push({...product});
            updateCartCount();
            renderFormCart();
            
            const notif = document.createElement('div');
            notif.className = "fixed bottom-8 right-8 bg-green-600 text-white px-10 py-5 rounded-3xl shadow-2xl z-[300]";
            notif.innerHTML = `✅ ${product.name} adicionado!`;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2200);
        }

        function updateCartCount() {
            document.getElementById('cart-count').textContent = cart.length;
        }

        function renderFormCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('total-price');
            container.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = `<p class="text-zinc-500 text-center py-12">Nenhum item ainda.<br>Clique nas fotos dos produtos acima.</p>`;
                totalEl.textContent = 'R$ 0,00';
                return;
            }

            cart.forEach((item, index) => {
                total += item.price;
                const div = document.createElement('div');
                div.className = "flex items-center justify-between bg-zinc-900 p-4 rounded-2xl mb-3";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <img src="${item.img}" class="w-14 h-14 object-cover rounded-xl">
                        <div>
                            <p class="font-medium">${item.name}</p>
                            <p class="text-violet-400 font-semibold">R$ ${item.price.toFixed(2)}</p>
                        </div>
                    </div>
                    <button onclick="removeFromFormCart(${index})" class="text-red-500 hover:text-red-600 p-3">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            totalEl.textContent = `R$ ${total.toFixed(2)}`;
        }

        function removeFromFormCart(index) {
            cart.splice(index, 1);
            updateCartCount();
            renderFormCart();
            renderCartModal();
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) renderCartModal();
        }

        function renderCartModal() {
            const container = document.getElementById('modal-cart-items');
            container.innerHTML = '';
            let total = 0;
            
            cart.forEach((item, index) => {
                total += item.price;
                const div = document.createElement('div');
                div.className = "flex justify-between items-center border-b border-zinc-700 pb-6";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <img src="${item.img}" class="w-16 h-16 object-cover rounded-xl">
                        <div>
                            <p>${item.name}</p>
                            <p class="text-violet-400">R$ ${item.price.toFixed(2)}</p>
                        </div>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-red-500 hover:text-red-600">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                `;
                container.appendChild(div);
            });
            document.getElementById('modal-total').textContent = `R$ ${total.toFixed(2)}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartCount();
            renderCartModal();
            renderFormCart();
        }

        function irParaPedido() {
            toggleCart();
            document.getElementById('pedidos').scrollIntoView({ behavior: 'smooth' });
        }

        // ==================== ENVIAR PEDIDO (MELHORADO) ====================
        async function enviarPedido(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const endereco = document.getElementById('endereco').value.trim();
            const personalizacao = document.getElementById('personalizacao').value.trim() || "Sem observações";

            if (cart.length === 0) return alert("❌ Adicione pelo menos um produto!");
            if (!nome || !whatsapp || !endereco) return alert("❌ Preencha nome, WhatsApp e endereço!");

            const novoPedido = {
                data: new Date().toLocaleString('pt-BR'),
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                nome,
                whatsapp,
                endereco,
                personalizacao,
                itens: cart,
                total: cart.reduce((acc, item) => acc + item.price, 0),
                status: "Pendente"
            };

            try {
                await db.collection("pedidos").add(novoPedido);
                alert(`🎉 Pedido enviado com sucesso!\n\nEntraremos em contato pelo WhatsApp em breve.`);
                
                document.getElementById('order-form').reset();
                cart = [];
                updateCartCount();
                renderFormCart();
            } catch (error) {
                console.error("Erro Firebase:", error);
                alert("❌ Erro ao enviar pedido.\n\nVerifique as regras do Firestore (deve estar em modo teste).");
            }
        }

        window.onload = function() {
            renderProducts();
            updateCartCount();
            renderFormCart();
        };
    </script>
</body>
</html>
